name: Apply Release Label Correction

on:
  push:
    branches: [maintenance/v1.0.1-release-label-correction]

permissions:
  contents: write

jobs:
  patch:
    if: "!contains(github.event.head_commit.message, '[release-label-patched]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: maintenance/v1.0.1-release-label-correction
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply release label correction
        run: python scripts/apply_release_label_correction.py
      - name: Commit corrected app docstring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py
          git commit -m "fix: update app release docstring to v1.0.1 [release-label-patched]"
          git push origin HEAD:maintenance/v1.0.1-release-label-correction
