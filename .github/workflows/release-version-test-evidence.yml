name: Release Version Test Evidence

on:
  push:
    branches: [maintenance/v1.0.1-release-label-correction]

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Capture exact pytest output
        run: python -m pytest -q > release-version-pytest.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: release-version-pytest-evidence
          path: release-version-pytest.txt
