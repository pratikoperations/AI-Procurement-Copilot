name: Quality Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Compile Python files
        run: python -m compileall -q app.py modules tests

      - name: Test annual volume units
        run: python -m pytest -q tests/test_annual_volume_units.py

      - name: Test currency display
        if: always()
        run: python -m pytest -q tests/test_currency_display.py

      - name: Test exports
        if: always()
        run: python -m pytest -q tests/test_exports.py

      - name: Test Supplier Intelligence currency
        if: always()
        run: python -m pytest -q tests/test_supplier_intelligence_currency.py

      - name: Test Supplier Intelligence UI
        if: always()
        run: python -m pytest -q tests/test_supplier_intelligence_ui.py

      - name: Run complete regression tests
        if: always()
        run: python -m pytest -q

      - name: Run Streamlit smoke test
        if: always()
        run: bash scripts/streamlit_smoke_test.sh
