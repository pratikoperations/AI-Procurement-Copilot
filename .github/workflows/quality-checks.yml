name: Quality Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    outputs:
      pytest_summary: ${{ steps.pytest.outputs.summary }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Compile Python files
        run: python -m compileall -q app.py modules tests

      - name: Run regression tests
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short > pytest.log 2>&1
          status=$?
          {
            echo 'summary<<EOF'
            tail -n 80 pytest.log
            echo EOF
          } >> "$GITHUB_OUTPUT"
          cat pytest.log
          exit $status

      - name: Run Streamlit smoke test
        run: bash scripts/streamlit_smoke_test.sh

  report:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Print concise pytest summary
        run: |
          cat <<'EOF'
          ${{ needs.test.outputs.pytest_summary }}
          EOF
