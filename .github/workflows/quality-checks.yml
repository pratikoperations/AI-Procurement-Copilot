name: Quality Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Record environment
        run: |
          python --version > recovery-r1-environment.txt
          python -m pip --version >> recovery-r1-environment.txt
          cat requirements.txt >> recovery-r1-environment.txt

      - name: Compile Python files
        run: python -m compileall -q app.py modules tests

      - name: Run regression tests
        run: python -m pytest > recovery-r1-pytest-output.txt 2>&1

      - name: Run Streamlit smoke test
        run: bash scripts/streamlit_smoke_test.sh > recovery-r1-smoke-output.txt 2>&1

      - name: Upload Recovery R1 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recovery-r1-test-evidence
          path: |
            recovery-r1-environment.txt
            recovery-r1-pytest-output.txt
            recovery-r1-smoke-output.txt
